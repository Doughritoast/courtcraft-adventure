<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtCraft Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="screen-1" class="screen">
            <h1 class="title">COURT-CRAFT</h1>
            <p class="subtitle">A Quest for [Her Name]</p>
            <button class="mc-btn" onclick="nextScreen(2)">Start Our Adventure</button>
        </div>

        <div id="screen-2" class="screen hidden">
            <div class="chat-box">
                <p id="chat-text">Player Doritos joined the game.</p>
                <div id="ingot-zone" class="hidden">
                    <img src="netherite.gif" class="netherite-gif" alt="Netherite Ingot">
                    <p class="caption">"I found something better than Netherite..."</p>
                </div>
                <button class="mc-btn sm" onclick="handleDialogue()">Next</button>
            </div>
        </div>

        <div id="screen-3" class="screen hidden">
            <h2 class="screen-title">Craft the Date Invite</h2>
            <div class="recipe-hint">Recipe: 🎟️ + ❤️ + 📍</div>
            <div class="crafting-layout">
                <div class="grid-3x3">
                    <div class="slot" ondrop="drop(event)" ondragover="allowDrop(event)" data-req="ticket"></div>
                    <div class="slot" ondrop="drop(event)" ondragover="allowDrop(event)" data-req="heart"></div>
                    <div class="slot" ondrop="drop(event)" ondragover="allowDrop(event)" data-req="map"></div>
                    <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                    <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                </div>
                <div class="mc-arrow">➜</div>
                <div class="slot result-slot" id="result-slot"></div>
            </div>
            <div class="inventory-bar">
                <div class="item" draggable="true" ondragstart="drag(event)" id="ticket">🎟️</div>
                <div class="item" draggable="true" ondragstart="drag(event)" id="heart">❤️</div>
                <div class="item" draggable="true" ondragstart="drag(event)" id="map">📍</div>
            </div>
        </div>

        <div id="screen-4" class="screen hidden">
            <div class="signpost">
                <p>Will you allow me to court you and be my Player 2?</p>
            </div>
            <div class="action-row">
                <button class="mc-btn yes" onclick="nextScreen(5)">YES</button>
                <button id="no-btn" class="mc-btn no" onmouseover="dodgeNo()">NO</button>
            </div>
            <p id="sad-msg" class="hidden">The "No" button escaped. 💔</p>
        </div>

        <div id="screen-5" class="screen hidden">
            <h1 class="lvl-up">LEVEL UP!</h1>
            <p>[Her Name] joined the game.</p>
            <div class="sparks">💎 💙 💎</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
